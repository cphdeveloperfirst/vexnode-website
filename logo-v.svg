<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="vgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4DA6FF"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#D946EF"/>
    </linearGradient>
    <linearGradient id="vgrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4DA6FF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- V letter -->
  <g filter="url(#glow)">
    <!-- Left stroke of V -->
    <path d="M15 20 L55 95 L65 95 L25 20 Z" fill="url(#vgrad)"/>
    <!-- Right stroke of V -->
    <path d="M105 20 L65 95 L55 95 L95 20 Z" fill="url(#vgrad2)"/>
    <!-- Connection at bottom -->
    <path d="M55 95 L65 95 L60 105 Z" fill="url(#vgrad)"/>
  </g>

  <!-- Node/key accent circle on right stroke -->
  <circle cx="78" cy="50" r="6" fill="none" stroke="url(#vgrad)" stroke-width="2.5"/>
  <line x1="78" y1="56" x2="78" y2="68" stroke="url(#vgrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="75" y1="62" x2="81" y2="62" stroke="url(#vgrad)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
